<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio | Zona de Miembros OCGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/miembros.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="dashboard-content">
        <div class="repositorio-container">
            <aside class="repositorio-sidebar">
                <div style="padding:1rem; color:#666">Cargando conjuntos...</div>
            </aside>
            <section class="repositorio-main">
                <div class="repo-header">
                    <h2>...</h2>
                    <span class="user-badge" id="repo-user-badge">...</span>
                </div>
                <div class="file-list" id="repo-file-list">
                    <p style="padding:1rem; color:#666"><i class="fas fa-spinner fa-spin"></i> Cargando tus partituras...</p>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../../js/main_miembros.js"></script>
</body>
</html>
