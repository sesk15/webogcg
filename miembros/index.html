<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Miembros | Orquesta Comunitaria Gran Canaria</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/miembros.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="login-page">
        <div class="login-card">
            <img src="../assets/images/violin.png" alt="Violín OCGC" class="violin-logo">
            <h2>Acceso a Miembros</h2>
            <p>Intranet de la Orquesta Comunitaria</p>
            
            <div id="login-error" style="color: red; margin-bottom: 1rem; display: none;">Credenciales incorrectas</div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Nombre de usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn" id="login-btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            
            <div class="login-links">
                <p><a href="#">¿Has olvidado tu contraseña?</a></p>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
